apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-app
spec:
  replicas: 2  # Run two instances for high availability
  selector:
    matchLabels:
      app: spring-boot
  template:
    metadata:
      labels:
        app: spring-boot
    spec:
      containers:
      - name: spring-boot
        image: your-dockerhub-username/spring-boot-app:latest # Jenkins will update this
        ports:
        - containerPort: 8080