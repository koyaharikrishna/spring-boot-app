apiVersion: v1
kind: Service
metadata:
  name: spring-boot-service
spec:
  type: LoadBalancer # Use NodePort if you are on a local machine/Minikube
  selector:
    app: spring-boot
  ports:
    - protocol: TCP
      port: 80       # Port the service listens on
      targetPort: 8080 # Port the Spring Boot app runs on